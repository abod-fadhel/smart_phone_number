name: smart_phone_number
description: A smart phone number parser that automatically detects country codes from number prefixes and validates WhatsApp accounts
version: 1.0.5
repository: https://github.com/abod-fadhel/smart_phone_number
homepage: https://github.com/abod-fadhel/smart_phone_number

environment:
  sdk: ^3.10.1
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  # phone_number: ^2.1.0
  url_launcher: ^6.3.0
  get_country_ip: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

keywords:
  - smart phone number
  - phone
  - number
  - whatsapp
  - validator
  - country
  - detection

platforms:
  android:
  ios:
  web:
